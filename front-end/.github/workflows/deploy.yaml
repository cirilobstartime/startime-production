name: Deploy Frontend

on:
  push:
    branches:
      - 3d-poc

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Set job timeout (default is 360 minutes)
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        timeout-minutes: 25  # Set step timeout
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 20m  # SSH action specific timeout
          script: |
            # Navigate to project directory
            cd /root/telNova/Startime-website
            
            # Pull latest changes
            git pull origin 3d-poc
            
            # Rebuild and restart Docker containers
            docker compose down
            docker compose up -d